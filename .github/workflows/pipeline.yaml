name: CI-CD
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & Push Service App
        run: |
          # הפיכת שם המשתמש לאותיות קטנות
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/service-app
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          docker build -t $IMAGE_ID:latest ./service-app
          docker push $IMAGE_ID:latest

      - name: Build & Push AI Agent
        run: |
          # הפיכת שם המשתמש לאותיות קטנות
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/ai-agent
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          docker build -t $IMAGE_ID:latest ./ai-agent
          docker push $IMAGE_ID:latest