name: CI-CD
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build & Push
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/service-app:latest ./service-app
          docker push ghcr.io/${{ github.repository_owner }}/service-app:latest
          docker build -t ghcr.io/${{ github.repository_owner }}/ai-agent:latest ./ai-agent
          docker push ghcr.io/${{ github.repository_owner }}/ai-agent:latest